<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <style>
    .bg { fill: #ffffff; }
    .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .head { fill: #e5e7eb; stroke: #1f2937; stroke-width: 2; }
    .external { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .event { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .text { font-family: Arial, sans-serif; font-size: 18px; fill: #111827; }
    .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
    .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
    .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #111827; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    .note { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="760"/>
  <text x="40" y="50" class="title">DevLink - Adapter</text>

  <rect x="60" y="105" width="225" height="115" class="box"/>
  <rect x="60" y="105" width="225" height="38" class="head"/>
  <text x="82" y="131" class="text">CLI Daemon</text>
  <text x="82" y="174" class="small">+ run_task(...)</text>
  <text x="82" y="198" class="small">uses common contract</text>

  <rect x="405" y="90" width="260" height="145" class="box"/>
  <rect x="405" y="90" width="260" height="38" class="head"/>
  <text x="427" y="116" class="text">&lt;&lt;interface&gt;&gt;</text>
  <text x="427" y="143" class="text">AgentAdapter</text>
  <text x="427" y="187" class="small">+ run(task)</text>
  <text x="427" y="211" class="small">returns AgentEvent stream</text>

  <rect x="140" y="360" width="280" height="160" class="box"/>
  <rect x="140" y="360" width="280" height="38" class="head"/>
  <text x="162" y="386" class="text">CodexAdapter</text>
  <text x="162" y="428" class="small">- stdout_lines</text>
  <text x="162" y="452" class="small">- stderr_lines</text>
  <text x="162" y="476" class="small">- edited_files</text>
  <text x="162" y="500" class="small">+ run(task)</text>

  <rect x="500" y="380" width="235" height="120" class="box"/>
  <rect x="500" y="380" width="235" height="38" class="head"/>
  <text x="522" y="406" class="text">ShellAdapter</text>
  <text x="522" y="450" class="small">+ run(task)</text>
  <text x="522" y="474" class="small">same AgentEvent API</text>

  <rect x="835" y="92" width="270" height="130" class="external"/>
  <text x="857" y="128" class="text">Codex CLI process</text>
  <text x="857" y="170" class="small">codex exec --json</text>
  <text x="857" y="194" class="small">stdout / stderr / exit_code</text>

  <rect x="830" y="365" width="270" height="140" class="event"/>
  <text x="852" y="402" class="text">AgentEvent</text>
  <text x="852" y="444" class="small">+ event_type</text>
  <text x="852" y="468" class="small">+ message</text>
  <text x="852" y="492" class="small">+ payload</text>

  <rect x="820" y="580" width="285" height="100" class="external"/>
  <text x="842" y="617" class="text">Backend API</text>
  <text x="842" y="657" class="small">POST task events</text>

  <rect x="65" y="610" width="405" height="85" class="note"/>
  <text x="87" y="642" class="small">Adapter tlumaczy format zewnetrzny Codex CLI</text>
  <text x="87" y="666" class="small">na jednolite zdarzenia AgentEvent dla DevLinka.</text>

  <path d="M285 160 L405 160" class="arrow"/>
  <text x="305" y="146" class="small">uses</text>

  <path d="M280 360 L470 235" class="dash"/>
  <path d="M610 380 L570 235" class="dash"/>
  <text x="445" y="308" class="small">implements</text>

  <path d="M420 430 L830 430" class="arrow"/>
  <text x="575" y="416" class="small">emits normalized events</text>

  <path d="M835 165 L420 410" class="arrow"/>
  <text x="565" y="292" class="small">external stream</text>

  <path d="M965 505 L965 580" class="arrow"/>
  <text x="980" y="548" class="small">send to API</text>

  <path d="M285 188 L830 620" class="arrow"/>
  <text x="390" y="615" class="small">daemon posts events</text>
</svg>

