services:
  postgres:
    image: postgres:17-alpine
    container_name: devlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devlink
      POSTGRES_USER: devlink
      POSTGRES_PASSWORD: devlink_password
    ports:
      - "54329:5432"
    volumes:
      - devlink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlink -d devlink"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: devlink-redis
    restart: unless-stopped
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  devlink_postgres_data:
